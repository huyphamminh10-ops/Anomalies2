services:
  - type: web
    name: anomalies-dashboard
    env: python
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: uvicorn dashboard.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
