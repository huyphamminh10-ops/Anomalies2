services:
  - type: web
    name: anomalies-dashboard
    env: python
    # ── Build: cài tất cả dependencies (Bot + Web) ──────────────────
    buildCommand: pip install -r requirements.txt
    # ── Start: Bot khởi động và kéo Web Dashboard theo ─────────────
    # bot_main.py là entry point duy nhất:
    #   - Chạy uvicorn (FastAPI Web) trên port $PORT
    #   - Khởi động Disnake Bot trong cùng event loop (asyncio.create_task)
    #   - Gán app.state.bot để Web truy cập bot.guilds trực tiếp
    startCommand: python bot_main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: TIDB_URL
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: RENDER
        value: "true"
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: IS_HTTPS
        value: "true"
      - key: PORT
        value: "10000"
