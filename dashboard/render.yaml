services:
  - type: web
    name: anomalies-dashboard
    env: python
    buildCommand: pip install -r dashboard/requirements.txt
    # Sửa: dùng python -m uvicorn thay vì uvicorn trực tiếp
    # Đảm bảo module path đúng: dashboard.server:app
    startCommand: python -m uvicorn dashboard.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: RENDER
        value: "true"
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: IS_HTTPS
        value: "true"
